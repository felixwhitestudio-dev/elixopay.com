name: Elixopay CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  # ─────────────────────────────────────────
  # 1. Lint & Test — TypeScript Backend (server/)
  # ─────────────────────────────────────────
  test-server:
    name: Test Server (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run linter
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Run tests
        run: npx jest --ci --verbose --coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 7

  # ─────────────────────────────────────────
  # 2. Build — TypeScript Compilation
  # ─────────────────────────────────────────
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: test-server
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build TypeScript
        run: npx tsc

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: server/dist/
          retention-days: 3

  # ─────────────────────────────────────────
  # 3. Deploy Public Site → S3
  # ─────────────────────────────────────────
  deploy-public-site:
    name: Deploy Public Site
    runs-on: ubuntu-latest
    needs: test-server
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-southeast-1' }}

      - name: Sync public site to S3
        run: |
          aws s3 sync public-site/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude ".git/*" \
            --exclude "*.md"

      - name: Invalidate CloudFront cache
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ─────────────────────────────────────────
  # 4. Deploy App Server → EC2
  # ─────────────────────────────────────────
  deploy-app-server:
    name: Deploy App Server
    runs-on: ubuntu-latest
    needs: build-server
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/elixopay
            git pull origin main
            
            # Update server (TypeScript backend)
            cd server
            npm ci --production
            npx prisma generate
            npx prisma migrate deploy
            npx tsc
            
            # Update app-server (JavaScript backend)
            cd ../app-server
            npm ci --production
            
            # Restart processes
            pm2 restart all
            pm2 save
