<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile - Elixopay</title>
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-center-card { max-width: 480px; }
        .auth-fg .auth-input-icon i { pointer-events: none; }
        .auth-alert.info {
            background: rgba(124,58,237,0.08);
            border: 1px solid rgba(124,58,237,0.2);
            color: var(--auth-purple-light);
        }
    </style>
</head>

<body class="auth-page">
    <div class="auth-bg-fx"></div>
    <div class="auth-grid-bg"></div>

    <!-- Navbar -->
    <nav class="auth-nav">
        <a href="https://www.elixopay.com/" class="auth-logo">
            <div class="auth-logo-mark">E</div>
            Elixopay
        </a>
    </nav>

    <!-- Center Card -->
    <div class="auth-center">
        <div class="auth-center-card auth-fade-in">
            <!-- Header -->
            <div style="text-align:center; margin-bottom:1.5rem;">
                <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--auth-purple),#a855f7);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;">
                    <i class="fas fa-user-edit" style="color:#fff;font-size:1.25rem;"></i>
                </div>
                <h2 data-i18n="profile.title">Complete Your Profile</h2>
                <p class="auth-form-sub" data-i18n="profile.subtitle">
                    Enter your real name to match your bank account for secure withdrawals.
                </p>
            </div>

            <!-- Info banner -->
            <div class="auth-alert info" style="margin-bottom:1.25rem;">
                <i class="fas fa-info-circle"></i>
                <span data-i18n="profile.notice">Your name must match the bank account you'll use for withdrawals.</span>
            </div>

            <form id="completeProfileForm" onsubmit="handleCompleteProfile(event)">
                <!-- First Name -->
                <div class="auth-fg">
                    <label for="firstName" data-i18n="profile.firstName">First Name *</label>
                    <div class="auth-input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="firstName" name="firstName" required placeholder="First name">
                    </div>
                </div>

                <!-- Last Name -->
                <div class="auth-fg">
                    <label for="lastName" data-i18n="profile.lastName">Last Name *</label>
                    <div class="auth-input-icon">
                        <i class="far fa-user"></i>
                        <input type="text" id="lastName" name="lastName" required placeholder="Last name">
                    </div>
                </div>

                <!-- Error -->
                <div id="form-error" class="auth-alert error hidden">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="form-error-message"></span>
                </div>

                <!-- Submit -->
                <button type="submit" id="submit-btn" class="auth-btn-primary" style="margin-top:0.5rem;">
                    <span id="submit-btn-text" data-i18n="profile.submit">Confirm Account</span>
                    <div id="submit-spinner" class="auth-spinner hidden"></div>
                </button>
            </form>

            <!-- Cancel -->
            <div style="text-align:center; margin-top:1.5rem;">
                <button onclick="cancelSetup()" class="auth-link" style="font-size:0.85rem; background:none; border:none; cursor:pointer;">
                    <i class="fas fa-arrow-left" style="margin-right:4px;"></i>
                    <span data-i18n="profile.cancel">Back to Login</span>
                </button>
            </div>
        </div>
    </div>

    <script src="/js/api-config.js"></script>
    <script src="/js/i18n.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tempToken = sessionStorage.getItem('tempGoogleToken');
            if (!tempToken) {
                window.location.href = '/login.html';
            }
        });

        function cancelSetup() {
            sessionStorage.removeItem('tempGoogleToken');
            window.location.href = '/login.html';
        }

        async function handleCompleteProfile(e) {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const tempToken = sessionStorage.getItem('tempGoogleToken');

            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('submit-spinner');
            const errorBox = document.getElementById('form-error');
            const errorMsg = document.getElementById('form-error-message');

            if (!firstName || !lastName) {
                errorMsg.textContent = 'Please enter both first and last name';
                errorBox.classList.remove('hidden');
                return;
            }

            errorBox.classList.add('hidden');
            btn.disabled = true;
            spinner.classList.remove('hidden');

            try {
                const baseUrl = (window.API_CONFIG && window.API_CONFIG.BASE_URL) || 'http://localhost:5001';
                const response = await fetch(baseUrl + '/api/v1/auth/google/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tempToken, firstName, lastName })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    sessionStorage.removeItem('tempGoogleToken');
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('authToken', data.token);
                    }
                    if (data.data?.user) {
                        localStorage.setItem('user', JSON.stringify(data.data.user));
                    }
                    window.location.href = '/dashboard.html';
                } else {
                    errorMsg.textContent = data.message || data.error?.message || 'An error occurred. Please try again.';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Cannot connect to server';
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>

</html>
