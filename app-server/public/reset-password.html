<!DOCTYPE html>
<html lang="th" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>ตั้งรหัสผ่านใหม่ - Elixopay</title>

    <script src="/js/api-config.js"></script>
    <script src="/js/i18n.js?v=3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .bg-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        body:not(.light) {
            background-color: #0f172a !important;
            color: #f8fafc !important;
        }

        body:not(.light) .bg-glass {
            background-color: #1e293b !important;
            border-color: #334155 !important;
        }

        body:not(.light) .text-gray-900 {
            color: #f8fafc !important;
        }

        body:not(.light) .text-gray-600,
        body:not(.light) .text-gray-500 {
            color: #94a3b8 !important;
        }

        body:not(.light) input {
            background-color: #0f172a !important;
            border-color: #334155 !important;
            color: white !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, #635BFF 0%, #7A73FF 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(99, 91, 255, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(99, 91, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col justify-center items-center p-4">

    <div class="absolute top-6 right-6">
        <button id="theme-toggle"
            class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors backdrop-blur-sm shadow-sm border border-gray-200/20 text-gray-500">
            <i class="fas fa-moon text-xl" id="theme-icon"></i>
        </button>
    </div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="https://www.elixopay.com/" class="inline-flex items-center justify-center space-x-2">
                <div
                    class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center transform rotate-12 shadow-lg">
                    <span class="text-white font-bold text-2xl" style="transform: rotate(-12deg);">e</span>
                </div>
                <span class="text-2xl font-bold tracking-tight text-gray-900">Elixopay</span>
            </a>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900" data-i18n="reset_password.title">ตั้งรหัสผ่านใหม่
            </h2>
            <p class="mt-2 text-sm text-gray-600" id="subtitle-text" data-i18n="reset_password.subtitle">
                กรุณากำหนดรหัสผ่านใหม่ที่ปลอดภัยสำหรับบัญชีของคุณ.</p>
        </div>

        <!-- Validation Overlay (Loading token) -->
        <div id="loadingOverlay"
            class="bg-glass rounded-2xl shadow-xl border border-gray-100 p-8 flex flex-col items-center justify-center min-h-[300px]">
            <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
            <p class="text-gray-600 font-medium" data-i18n="reset_password.verifying">กำลังตรวจสอบลิงก์...</p>
        </div>

        <!-- Invalid Token -->
        <div id="invalidOverlay"
            class="hidden bg-glass rounded-2xl shadow-xl border border-gray-100 p-8 flex flex-col items-center justify-center text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-4 text-red-500 text-2xl">
                <i class="fas fa-times-circle"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2" data-i18n="reset_password.invalid_title">
                ลิงก์ไม่ถูกต้องหรือหมดอายุ</h3>
            <p class="text-sm text-gray-500 mb-6" data-i18n="reset_password.invalid_desc">ลิงก์นี้ถูกใช้งานไปแล้ว
                หรือหมดเวลาที่กำหนด กรุณาส่งคำขอใหม่อีกครั้ง</p>
            <a href="/forgot-password.html"
                class="btn-primary w-full inline-flex justify-center py-3 px-4 rounded-xl text-sm font-semibold text-white">
                <span data-i18n="reset_password.request_new">ขอลิงก์ใหม่</span>
            </a>
        </div>

        <!-- Form Card -->
        <div id="formOverlay"
            class="hidden bg-glass rounded-2xl shadow-xl border border-gray-100 p-8 relative overflow-hidden">

            <form id="resetPasswordForm" class="space-y-5" onsubmit="handleResetPassword(event)">

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1"
                        data-i18n="reset_password.new_pass">New Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input id="password" name="password" type="password" required minlength="8"
                            class="block w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all sm:text-sm text-gray-900 bg-white"
                            placeholder="••••••••">
                        <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center"
                            onclick="togglePassword('password', 'eye-icon-1')">
                            <i class="fas fa-eye text-gray-400 hover:text-gray-600 transition-colors"
                                id="eye-icon-1"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1"
                        data-i18n="reset_password.confirm_pass">Confirm Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input id="confirm_password" name="confirm_password" type="password" required minlength="8"
                            class="block w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all sm:text-sm text-gray-900 bg-white"
                            placeholder="••••••••">
                        <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center"
                            onclick="togglePassword('confirm_password', 'eye-icon-2')">
                            <i class="fas fa-eye text-gray-400 hover:text-gray-600 transition-colors"
                                id="eye-icon-2"></i>
                        </button>
                    </div>
                </div>

                <div id="errorMessage" class="hidden rounded-lg bg-red-50 p-3 border border-red-100 flex items-start">
                    <i class="fas fa-exclamation-circle text-red-500 mt-0.5 mr-2"></i>
                    <p id="errorText" class="text-sm text-red-600"></p>
                </div>

                <div id="successMessage" class="hidden rounded-lg bg-green-50 p-4 border border-green-100 text-center">
                    <div
                        class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-3 text-green-500 text-xl">
                        <i class="fas fa-check"></i>
                    </div>
                    <h3 class="text-sm font-bold text-green-800 mb-1" data-i18n="reset_password.success_title">
                        รหัสผ่านถูกเปลี่ยนสำเร็จ!</h3>
                    <p class="text-sm text-green-600" data-i18n="reset_password.success_desc">
                        คุณกำลังถูกนำไปยังหน้าแดชบอร์ดส่วนตัวของคุณ...</p>
                </div>

                <button type="submit" id="submitBtn"
                    class="btn-primary w-full flex justify-center py-3 px-4 rounded-xl text-sm font-semibold text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all hover:scale-[1.02]">
                    <span id="btnText" data-i18n="reset_password.submit">บันทึกรหัสผ่าน</span>
                    <div id="btnLoading" class="hidden flex items-center">
                        <div class="spinner mr-2"></div> กำลังดำเนินการ...
                    </div>
                </button>
            </form>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const currentTheme = localStorage.getItem('theme') || 'light';

        if (currentTheme === 'dark') {
            document.body.classList.remove('light');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        } else {
            document.body.classList.add('light');
        }

        themeToggle?.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            if (isLight) {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            } else {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
        });

        // Toggle Password Visibility
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        let resetToken = null;

        // On Load: Extract token
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            resetToken = urlParams.get('token');

            if (!resetToken) {
                // Instantly invalid
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('invalidOverlay').classList.remove('hidden');
            } else {
                // In a perfect system we could make a fast API verify-token call here,
                // but we will verify on submission for simplicity unless requested.
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('formOverlay').classList.remove('hidden');
            }
        });

        async function handleResetPassword(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm_password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successMsg = document.getElementById('successMessage');

            errorMsg.classList.add('hidden');

            if (pass !== confirmPass) {
                errorText.textContent = "รหัสผ่านไม่ตรงกัน";
                errorMsg.classList.remove('hidden');
                return;
            }

            if (!resetToken) return;

            // Loading state
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const apiFn = window.apiFetch || fetch;
                const url = window.API_CONFIG ? window.API_CONFIG.BASE_URL + '/api/v1/auth/reset-password/' + resetToken : '/api/v1/auth/reset-password/' + resetToken;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
                }

                // Success
                document.getElementById('resetPasswordForm').querySelectorAll('div.relative').forEach(el => el.parentElement.classList.add('hidden')); // hide inputs
                submitBtn.classList.add('hidden');
                successMsg.classList.remove('hidden');
                document.getElementById('subtitle-text').classList.add('hidden');

                // Save token to localStorage to auto-login
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    if (data.data && data.data.user) {
                        localStorage.setItem('user', JSON.stringify(data.data.user));
                    }
                }

                // Redirect
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 2000);

            } catch (err) {
                errorText.textContent = err.message;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');

                if (err.message.includes('expired') || err.message.includes('invalid')) {
                    setTimeout(() => {
                        document.getElementById('formOverlay').classList.add('hidden');
                        document.getElementById('invalidOverlay').classList.remove('hidden');
                    }, 2000);
                }
            }
        }
    </script>
</body>

</html>
