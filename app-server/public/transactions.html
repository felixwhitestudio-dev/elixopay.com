<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Elixopay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/design-system.css?v=2">
    <script src="/js/api-config.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/auth-guard.js?v=1.1" data-require-role="user"></script>
    <style>
        /* Override light-theme Tailwind classes for dark mode */
        .bg-gray-50, .bg-white { background-color: var(--ep-bg-card) !important; color: var(--ep-text-primary) !important; }
        .text-gray-900, .text-gray-800 { color: var(--ep-text-primary) !important; }
        .text-gray-700, .text-gray-600 { color: var(--ep-text-secondary) !important; }
        .text-gray-500 { color: var(--ep-text-muted) !important; }
        .text-gray-400 { color: var(--ep-text-muted) !important; }
        .border-gray-200, .border-gray-300 { border-color: var(--ep-border) !important; }
        .shadow { box-shadow: var(--ep-shadow-sm) !important; }
        .bg-blue-100 { background: rgba(59, 130, 246, 0.12) !important; }
        .bg-green-100 { background: rgba(34, 197, 94, 0.12) !important; }
        .bg-yellow-100 { background: rgba(245, 158, 11, 0.12) !important; }
        .bg-purple-100 { background: rgba(124, 58, 237, 0.12) !important; }
        .bg-red-100 { background: rgba(239, 68, 68, 0.12) !important; }
        select, input { background-color: var(--ep-bg-base) !important; color: var(--ep-text-primary) !important; border-color: var(--ep-border) !important; }
        table thead { background: rgba(124, 58, 237, 0.04) !important; }
        table th { color: var(--ep-text-muted) !important; border-color: var(--ep-border) !important; }
        table td { color: var(--ep-text-secondary) !important; border-color: var(--ep-border) !important; }
        table tbody tr:hover { background: var(--ep-bg-hover) !important; }
    </style>
</head>

<body class="ep-body">
    <div class="ep-layout">
    <div class="ep-main-wrap">
    <main class="ep-content">
        <!-- Main Content -->
        <div>
            <div class="ep-page-header">
                <h1 class="ep-page-title">Transactions</h1>
                <p class="ep-page-subtitle">View and manage all your payment transactions</p>
            </div>
            <!-- Statistics Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-blue-100 rounded-lg p-3">
                            <i class="fas fa-receipt text-blue-600 text-xl"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm text-gray-500" data-i18n="filter.all">ทั้งหมด</p>
                            <p class="text-2xl font-bold text-gray-900" id="totalCount">-</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-green-100 rounded-lg p-3">
                            <i class="fas fa-check-circle text-green-600 text-xl"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm text-gray-500" data-i18n="filter.succeeded">สำเร็จ</p>
                            <p class="text-2xl font-bold text-green-600" id="successCount">-</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-yellow-100 rounded-lg p-3">
                            <i class="fas fa-clock text-yellow-600 text-xl"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm text-gray-500" data-i18n="filter.pending">รอดำเนินการ</p>
                            <p class="text-2xl font-bold text-yellow-600" id="pendingCount">-</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-purple-100 rounded-lg p-3">
                            <i class="fas fa-dollar-sign text-purple-600 text-xl"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-sm text-gray-500" data-i18n="filter.total">ยอดรวม</p>
                            <p class="text-xl font-bold text-purple-600" id="totalAmount">-</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-white rounded-lg shadow p-4 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="filter.status">สถานะ</label>
                        <select id="statusFilter" onchange="loadTransactions()"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="" data-i18n="filter.all">ทั้งหมด</option>
                            <option value="succeeded" data-i18n="filter.succeeded">สำเร็จ</option>
                            <option value="pending" data-i18n="filter.pending">รอดำเนินการ</option>
                            <option value="failed" data-i18n="filter.failed">ล้มเหลว</option>
                            <option value="cancelled" data-i18n="filter.cancelled">ยกเลิก</option>
                            <option value="refunded" data-i18n="filter.refunded">คืนเงิน</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="filter.sortBy">เรียงตาม</label>
                        <select id="sortField" onchange="loadTransactions()"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="created_at" data-i18n="filter.createdAt">วันที่สร้าง</option>
                            <option value="amount" data-i18n="filter.amount">จำนวนเงิน</option>
                            <option value="status" data-i18n="filter.status">สถานะ</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="filter.order">ลำดับ</label>
                        <select id="sortOrder" onchange="loadTransactions()"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="DESC" data-i18n="filter.desc">ล่าสุดก่อน</option>
                            <option value="ASC" data-i18n="filter.asc">เก่าสุดก่อน</option>
                        </select>
                    </div>

                    <div class="flex items-end">
                        <button onclick="loadTransactions()"
                            class="w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                            <i class="fas fa-sync mr-2"></i>รีเฟรช
                        </button>
                    </div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i>
                <p class="mt-4 text-gray-600" data-i18n="common.loading">กำลังโหลดข้อมูล...</p>
            </div>

            <!-- Transactions Table -->
            <div id="transactionsTable" class="hidden bg-white rounded-lg shadow overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    วันที่/เวลา</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    ID</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    คำอธิบาย</th>
                                <th
                                    class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    จำนวนเงิน</th>
                                <th
                                    class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    สถานะ</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Stripe ID</th>
                                <th
                                    class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsList" class="bg-white divide-y divide-gray-200">
                            <!-- Will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="bg-gray-50 px-4 py-3 border-t border-gray-200 sm:px-6">
                    <div class="flex items-center justify-between">
                        <div class="text-sm text-gray-700">
                            <span data-i18n="pagination.showing">แสดง</span> <span id="showingFrom" class="font-medium">1</span> <span data-i18n="pagination.to">ถึง</span> <span id="showingTo"
                                class="font-medium">10</span> <span data-i18n="pagination.from">จาก</span> <span id="totalRecords" class="font-medium">0</span>
                            รายการ
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="previousPage()" id="prevBtn"
                                class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                                <i class="fas fa-chevron-left mr-2"></i>ก่อนหน้า
                            </button>
                            <button onclick="nextPage()" id="nextBtn"
                                class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                                ถัดไป<i class="fas fa-chevron-right ml-2"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let authToken = null;
        let currentPage = 0;
        const itemsPerPage = 20;

        // Status badges
        const statusBadges = {
            'succeeded': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800"><i class="fas fa-check-circle mr-1"></i>สำเร็จ</span>',
            'pending': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-yellow-100 text-yellow-800"><i class="fas fa-clock mr-1"></i>รอดำเนินการ</span>',
            'failed': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800"><i class="fas fa-times-circle mr-1"></i>ล้มเหลว</span>',
            'cancelled': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-gray-100 text-gray-800"><i class="fas fa-ban mr-1"></i>ยกเลิก</span>',
            'refunded': '<span class="px-3 py-1 text-xs font-semibold rounded-full bg-purple-100 text-purple-800"><i class="fas fa-undo mr-1"></i>คืนเงิน</span>'
        };

        // Initialize after auth guard passes
        function initAfterAuth() {
            authToken = localStorage.getItem('token');
            if (!authToken) return; // guard will redirect if invalid
            loadStats();
            loadTransactions();
        }

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/v1/payments/stats`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const result = await response.json();
                if (result.success) {
                    const stats = result.data.stats;
                    document.getElementById('totalCount').textContent = stats.totalPayments;
                    document.getElementById('successCount').textContent = stats.completedPayments;
                    document.getElementById('pendingCount').textContent = stats.pendingPayments;
                    document.getElementById('totalAmount').textContent = `฿${stats.totalAmount.toLocaleString('th-TH', { minimumFractionDigits: 2 })}`;
                }
            } catch (error) {
                console.error('Stats error:', error);
            }
        }

        // Load transactions
        async function loadTransactions() {
            const status = document.getElementById('statusFilter').value;
            const sort = document.getElementById('sortField').value;
            const order = document.getElementById('sortOrder').value;
            const offset = currentPage * itemsPerPage;

            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('transactionsTable').classList.add('hidden');

            try {
                let url = `${API_CONFIG.BASE_URL}/api/v1/payments?limit=${itemsPerPage}&offset=${offset}&sort=${sort}&order=${order}`;
                if (status) url += `&status=${status}`;

                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const result = await response.json();
                if (result.success) {
                    displayTransactions(result.data.payments);
                    updatePagination(result.data.pagination);
                }
            } catch (error) {
                console.error('Load error:', error);
            } finally {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('transactionsTable').classList.remove('hidden');
            }
        }

        // Display transactions
        function displayTransactions(payments) {
            const tbody = document.getElementById('transactionsList');
            tbody.innerHTML = '';

            if (payments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500" data-i18n="table.noTransactions">ไม่พบรายการธุรกรรม</td></tr>';
                return;
            }

            payments.forEach(payment => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50';

                const date = new Date(payment.created_at);
                const formattedDate = date.toLocaleDateString('th-TH', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formattedDate}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-gray-600">${payment.id.substring(0, 8)}...</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${payment.description || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-right font-semibold text-gray-900">฿${parseFloat(payment.amount).toLocaleString('th-TH', { minimumFractionDigits: 2 })}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center">${statusBadges[payment.status] || payment.status}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-gray-500">${payment.payment_intent_id || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center text-sm">
                        <a href="https://dashboard.stripe.com/test/payments/${payment.payment_intent_id}" target="_blank" class="text-blue-600 hover:text-blue-800 mr-3" title="ดูใน Stripe">
                            <i class="fas fa-external-link-alt"></i>
                        </a>
                        <button onclick="viewDetails('${payment.id}')" class="text-gray-600 hover:text-gray-800" title="รายละเอียด">
                            <i class="fas fa-info-circle"></i>
                        </button>
                        ${getActionButton(payment)}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Update pagination
        function updatePagination(pagination) {
            document.getElementById('totalRecords').textContent = pagination.total;
            document.getElementById('showingFrom').textContent = pagination.offset + 1;
            document.getElementById('showingTo').textContent = Math.min(pagination.offset + pagination.limit, pagination.total);

            document.getElementById('prevBtn').disabled = pagination.offset === 0;
            document.getElementById('nextBtn').disabled = !pagination.hasMore;
        }

        // Pagination functions
        function previousPage() {
            if (currentPage > 0) {
                currentPage--;
                loadTransactions();
            }
        }

        function nextPage() {
            currentPage++;
            loadTransactions();
        }

        // View details
        async function viewDetails(paymentId) {
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/v1/payments/${paymentId}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const result = await response.json();
                if (result.success) {
                    alert(JSON.stringify(result.data.payment, null, 2));
                }
            } catch (error) {
                console.error('View details error:', error);
            }
        }

        // Helper helper to generate action button
        function getActionButton(payment) {
            if (payment.status === 'pending') {
                return `<button onclick="cancelPayment('${payment.id}')" class="text-red-600 hover:text-red-800 ml-3" title="ยกเลิกรายการ">
                            <i class="fas fa-ban"></i>
                        </button>`;
            } else if (payment.status === 'succeeded' || payment.status === 'completed') {
                return `<button onclick="refundPayment('${payment.id}')" class="text-orange-600 hover:text-orange-800 ml-3" title="คืนเงิน (Refund)">
                            <i class="fas fa-undo"></i>
                        </button>`;
            }
            return '';
        }

        async function cancelPayment(id) {
            if (!confirm('ยืนยันการยกเลิกรายการ?')) return;
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/v1/payments/${id}/cancel`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const result = await response.json();
                if (result.success) {
                    alert('ยกเลิกรายการสำเร็จ');
                    loadTransactions();
                    loadStats();
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
            }
        }

        async function refundPayment(id) {
            if (!confirm('ยืนยันการคืนเงิน? การกระทำนี้ไม่สามารถย้อนกลับได้')) return;
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/api/v1/payments/${id}/refund`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const result = await response.json();
                if (result.success) {
                    alert('คืนเงินสำเร็จ');
                    loadTransactions();
                    loadStats();
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
            }
        }

        // Logout
        async function logout() {
            try {
                if (window.apiFetch && window.API_CONFIG) {
                    await window.apiFetch(window.API_CONFIG.ENDPOINTS.auth.logout, { method: 'POST' });
                }
            } catch (e) {
                console.error('Logout error', e);
            }
            localStorage.removeItem('authToken');
            localStorage.removeItem('token');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('authRefreshToken');
            window.location.href = '/login.html';
        }

        // Initialize after auth is verified to avoid flicker
        window.addEventListener('auth:ready', initAfterAuth, { once: true });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ui-enhancements.js?v=6"></script>
    </div><!-- close content div -->
    </main>
    </div><!-- /ep-main-wrap -->
    </div><!-- /ep-layout -->
    <script src="/js/sidebar.js"></script>
</body>

</html>
