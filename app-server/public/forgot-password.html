<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Forgot Password - Elixopay</title>
    <meta name="robots" content="noindex, nofollow">

    <script src="/js/api-config.js"></script>
    <script src="/js/i18n.js?v=5"></script>

    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <div class="auth-bg-fx"></div>
    <div class="auth-grid-bg"></div>

    <!-- Mobile Navbar -->
    <div class="auth-mobile-nav">
        <a href="https://www.elixopay.com/" class="auth-logo">
            <div class="auth-logo-mark">E</div>
            Elixopay
        </a>
    </div>

    <!-- Desktop Navbar -->
    <nav class="auth-nav">
        <a href="https://www.elixopay.com/" class="auth-logo">
            <div class="auth-logo-mark">E</div>
            Elixopay
        </a>
        <div class="auth-nav-links">
            <a href="/login.html" data-i18n="nav.login">Login</a>
            <a href="/signup.html" class="auth-nav-btn" data-i18n="nav.signup">Sign Up</a>
        </div>
    </nav>

    <!-- Center Card Layout -->
    <div class="auth-center">
        <div class="auth-center-card auth-fade-in">
            <!-- Logo -->
            <div style="text-align:center; margin-bottom:1.5rem;">
                <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--auth-purple),#a855f7);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;">
                    <i class="fas fa-lock" style="color:#fff;font-size:1.25rem;"></i>
                </div>
                <h2 data-i18n="forgot_password.title">Forgot Password?</h2>
                <p class="auth-form-sub" data-i18n="forgot_password.subtitle">
                    No worries. Enter your email and we'll send you a reset link.
                </p>
            </div>

            <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
                <!-- Email -->
                <div class="auth-fg">
                    <label for="email" data-i18n="auth.email">Email address</label>
                    <div class="auth-input-icon">
                        <i class="far fa-envelope"></i>
                        <input id="email" name="email" type="email" autocomplete="email" required
                            placeholder="you@company.com">
                    </div>
                </div>

                <!-- Error -->
                <div id="errorMessage" class="auth-alert error hidden">
                    <i class="fas fa-exclamation-circle"></i>
                    <p id="errorText"></p>
                </div>

                <!-- Success -->
                <div id="successMessage" class="hidden" style="text-align:center; padding:1.5rem 0;">
                    <div style="width:56px;height:56px;border-radius:50%;background:rgba(34,197,94,0.12);border:2px solid rgba(34,197,94,0.25);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;">
                        <i class="fas fa-paper-plane" style="color:#4ade80;font-size:1.25rem;"></i>
                    </div>
                    <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:0.5rem;color:var(--auth-text);"
                        data-i18n="forgot_password.success_title">Check your inbox</h3>
                    <p style="font-size:0.88rem;color:var(--auth-muted);line-height:1.6;margin-bottom:1.25rem;"
                        data-i18n="forgot_password.success_desc">
                        We've sent a password reset link to your email (if it exists in our system).
                    </p>
                    <button type="button" onclick="window.location.href='/login.html'"
                        class="auth-btn-primary" style="max-width:240px;margin:0 auto;">
                        <i class="fas fa-arrow-left"></i>
                        <span data-i18n="forgot_password.return_login">Back to Login</span>
                    </button>
                </div>

                <!-- Submit -->
                <button type="submit" id="submitBtn" class="auth-btn-primary" style="margin-top:0.5rem;">
                    <span id="btnText" data-i18n="forgot_password.send_link">Send Reset Link</span>
                    <div id="btnLoading" class="hidden" style="display:flex;align-items:center;gap:8px;">
                        <div class="auth-spinner"></div>
                        <span>Processing...</span>
                    </div>
                </button>
            </form>

            <!-- Back link -->
            <div style="text-align:center; margin-top:1.5rem;">
                <a href="/login.html" class="auth-link" style="font-size:0.85rem;">
                    <i class="fas fa-arrow-left" style="margin-right:4px;"></i>
                    <span data-i18n="forgot_password.back_to_login">Remember your password? Sign in</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successMsg = document.getElementById('successMessage');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            btnLoading.style.display = 'flex';

            try {
                const apiFn = window.apiFetch || fetch;
                const response = await apiFn('/api/v1/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.message || 'An error occurred');
                }

                document.getElementById('forgotPasswordForm').reset();
                submitBtn.classList.add('hidden');
                document.querySelector('.auth-fg').classList.add('hidden');
                successMsg.classList.remove('hidden');

            } catch (err) {
                errorText.textContent = err.message;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        }
    </script>
</body>

</html>
