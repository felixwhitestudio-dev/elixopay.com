<!DOCTYPE html>
<html lang="th" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>ลืมรหัสผ่าน - Elixopay</title>

    <script src="/js/api-config.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .bg-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        body:not(.light) {
            background-color: #0f172a !important;
            color: #f8fafc !important;
        }

        body:not(.light) .bg-glass {
            background-color: #1e293b !important;
            border-color: #334155 !important;
        }

        body:not(.light) .text-gray-900 {
            color: #f8fafc !important;
        }

        body:not(.light) .text-gray-600 {
            color: #94a3b8 !important;
        }

        body:not(.light) input {
            background-color: #0f172a !important;
            border-color: #334155 !important;
            color: white !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, #635BFF 0%, #7A73FF 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(99, 91, 255, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(99, 91, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col justify-center items-center p-4">

    <!-- Theme Toggle -->
    <div class="absolute top-6 right-6">
        <button id="theme-toggle"
            class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors backdrop-blur-sm shadow-sm border border-gray-200/20 text-gray-500">
            <i class="fas fa-moon text-xl" id="theme-icon"></i>
        </button>
    </div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="https://www.elixopay.com/" class="inline-flex items-center justify-center space-x-2">
                <div
                    class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center transform rotate-12 shadow-lg">
                    <span class="text-white font-bold text-2xl" style="transform: rotate(-12deg);">e</span>
                </div>
                <span class="text-2xl font-bold tracking-tight text-gray-900">Elixopay</span>
            </a>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900" data-i18n="forgot_password.title">ลืมรหัสผ่าน?</h2>
            <p class="mt-2 text-sm text-gray-600" data-i18n="forgot_password.subtitle">ไม่ต้องกังวล
                กรอกอีเมลของคุณเพื่อรับลิงก์สำหรับตั้งรหัสผ่านใหม่</p>
        </div>

        <!-- Card -->
        <div class="bg-glass rounded-2xl shadow-xl border border-gray-100 p-8 relative overflow-hidden">

            <form id="forgotPasswordForm" class="space-y-5" onsubmit="handleForgotPassword(event)">

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="auth.email">Email
                        address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="far fa-envelope text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required
                            class="block w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all sm:text-sm text-gray-900 bg-white"
                            placeholder="you@company.com">
                    </div>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="hidden rounded-lg bg-red-50 p-3 border border-red-100 flex items-start">
                    <i class="fas fa-exclamation-circle text-red-500 mt-0.5 mr-2"></i>
                    <p id="errorText" class="text-sm text-red-600"></p>
                </div>

                <!-- Success Message -->
                <div id="successMessage" class="hidden rounded-lg bg-green-50 p-4 border border-green-100 text-center">
                    <div
                        class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-3 text-green-500 text-xl">
                        <i class="fas fa-paper-plane"></i>
                    </div>
                    <h3 class="text-sm font-bold text-green-800 mb-1" data-i18n="forgot_password.success_title">
                        ตรวจสอบกล่องจดหมายของคุณ</h3>
                    <p class="text-sm text-green-600" data-i18n="forgot_password.success_desc">
                        เราได้ส่งลิงก์สำหรับรีเซ็ตรหัสผ่านไปยังอีเมลของคุณแล้ว (หากมีอยู่ในระบบ)</p>
                    <button type="button" onclick="window.location.href='/login.html'"
                        class="mt-4 text-sm font-medium text-indigo-600 hover:text-indigo-500">
                        <i class="fas fa-arrow-left mr-1"></i> <span
                            data-i18n="forgot_password.return_login">กลับไปหน้าเข้าสู่ระบบ</span>
                    </button>
                </div>

                <button type="submit" id="submitBtn"
                    class="btn-primary w-full flex justify-center py-3 px-4 rounded-xl text-sm font-semibold text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    <span id="btnText" data-i18n="forgot_password.send_link">ส่งลิงก์รีเซ็ตรหัสผ่าน</span>
                    <div id="btnLoading" class="hidden flex items-center">
                        <div class="spinner mr-2"></div> กำลังดำเนินการ...
                    </div>
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/login.html"
                    class="text-sm font-medium text-indigo-600 hover:text-indigo-500 transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i> <span
                        data-i18n="forgot_password.back_to_login">จำรหัสผ่านได้แล้ว? เข้าสู่ระบบ</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Theme Logic (Simple Version) -->
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const currentTheme = localStorage.getItem('theme') || 'light';

        if (currentTheme === 'dark') {
            document.body.classList.remove('light');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        } else {
            document.body.classList.add('light');
        }

        themeToggle?.addEventListener('click', () => {
            const isLight = document.body.classList.toggle('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            if (isLight) {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            } else {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
        });

        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successMsg = document.getElementById('successMessage');

            // Reset UI
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                // Ensure apiFetch is available from api-config.js, fallback to fetch
                const apiFn = window.apiFetch || fetch;
                const response = await apiFn('/api/v1/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'เกิดข้อผิดพลาดในการส่งคำขอ');
                }

                // Success
                document.getElementById('forgotPasswordForm').reset();
                submitBtn.classList.add('hidden'); // Hide submit after success
                document.querySelector('label[for="email"]').parentElement.classList.add('hidden'); // Hide input
                successMsg.classList.remove('hidden');

            } catch (err) {
                errorText.textContent = err.message;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        }
    </script>
</body>

</html>
