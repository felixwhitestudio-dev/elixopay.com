<!DOCTYPE html>
<html lang="th">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>KYC Applications - Admin | Elixopay</title>
	<link rel="stylesheet" href="/css/design-system.css?v=2">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
	<style>
		/* Keep existing dark-mode component styles but use design system vars */
		body.light { background: #f8fafc; color: #0f172a; }
		.container { max-width: 1400px; margin: 0 auto; }
		.header { background: var(--ep-bg-card); padding: 1.25rem; border-radius: var(--ep-radius-lg); margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--ep-border); }
		body.light .header { background: #ffffff; border-color: #e2e8f0; }

		.stat-card { background: var(--ep-bg-card); padding: 1.25rem; border-radius: var(--ep-radius-lg); border: 1px solid var(--ep-border); }
		body.light .stat-card { background: #ffffff; border-color: #e2e8f0; }
		.stat-value { font-family: var(--ep-font-mono); font-size: 1.8rem; font-weight: 700; color: var(--ep-purple-light); }
		.stat-label { font-size: .8rem; color: var(--ep-text-muted); margin-top: .5rem; }
		.card { background: var(--ep-bg-card); border-radius: var(--ep-radius-lg); border: 1px solid var(--ep-border); overflow: hidden; }
		body.light .card { background: #ffffff; border-color: #e2e8f0; }
		.card-header { padding: 1.25rem; border-bottom: 1px solid var(--ep-border); display: flex; justify-content: space-between; align-items: center; }
		body.light .card-header { border-bottom-color: #e2e8f0; }
		table { width: 100%; border-collapse: collapse; }
		th { text-align: left; padding: 1rem 1.25rem; font-size: .75rem; font-weight: 700; color: var(--ep-text-muted); text-transform: uppercase; letter-spacing: .5px; background: rgba(124, 58, 237, 0.04); }
		td { padding: 1rem 1.25rem; border-top: 1px solid var(--ep-border); color: var(--ep-text-secondary); }
		body.light td { border-top-color: #e2e8f0; }

		body.light .stat-card {
			background: #ffffff;
			border-color: #e2e8f0;
		}

		.stat-value {
			font-size: 2rem;
			font-weight: 700;
			color: #6366f1;
		}

		.stat-label {
			font-size: .85rem;
			color: #94a3b8;
			margin-top: .5rem;
		}

		.card {
			background: #1e293b;
			border-radius: 12px;
			border: 1px solid rgba(255, 255, 255, .08);
			overflow: hidden;
		}

		body.light .card {
			background: #ffffff;
			border-color: #e2e8f0;
		}

		.card-header {
			padding: 1.5rem;
			border-bottom: 1px solid rgba(255, 255, 255, .08);
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		body.light .card-header {
			border-bottom-color: #e2e8f0;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th {
			text-align: left;
			padding: 1rem 1.5rem;
			font-size: .85rem;
			font-weight: 600;
			color: #94a3b8;
			text-transform: uppercase;
			letter-spacing: .5px;
			background: rgba(99, 102, 241, .05);
		}

		td {
			padding: 1rem 1.5rem;
			border-top: 1px solid rgba(255, 255, 255, .08);
		}

		body.light td {
			border-top-color: #e2e8f0;
		}

		.badge {
			display: inline-block;
			padding: .35rem .75rem;
			border-radius: 6px;
			font-size: .75rem;
			font-weight: 600;
		}

		.badge-pending {
			background: rgba(251, 191, 36, .15);
			color: #fbbf24;
		}

		.badge-approved {
			background: rgba(34, 197, 94, .15);
			color: #22c55e;
		}

		.badge-rejected {
			background: rgba(239, 68, 68, .15);
			color: #ef4444;
		}

		.btn {
			padding: .5rem 1rem;
			border-radius: 6px;
			font-size: .85rem;
			font-weight: 600;
			cursor: pointer;
			border: none;
			transition: all .2s;
			text-decoration: none;
			display: inline-block;
		}

		.btn-approve {
			background: #22c55e;
			color: #fff;
		}

		.btn-approve:hover {
			background: #16a34a;
		}

		.btn-reject {
			background: #ef4444;
			color: #fff;
		}

		.btn-reject:hover {
			background: #dc2626;
		}

		.btn-view {
			background: rgba(99, 102, 241, .15);
			color: #6366f1;
		}

		.btn-view:hover {
			background: rgba(99, 102, 241, .25);
		}

		.actions {
			display: flex;
			gap: .5rem;
		}

		.modal {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: rgba(0, 0, 0, .7);
			z-index: 1000;
			align-items: center;
			justify-content: center;
		}

		.modal.active {
			display: flex;
		}

		.modal-content {
			background: #1e293b;
			border-radius: 16px;
			padding: 2rem;
			max-width: 600px;
			width: 90%;
			max-height: 90vh;
			overflow-y: auto;
			border: 1px solid rgba(255, 255, 255, .08);
		}

		body.light .modal-content {
			background: #ffffff;
			border-color: #e2e8f0;
		}

		.modal-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 1.5rem;
		}

		.modal-title {
			font-size: 1.5rem;
			font-weight: 700;
		}

		.close-btn {
			background: none;
			border: none;
			color: #94a3b8;
			font-size: 1.5rem;
			cursor: pointer;
		}

		.detail-row {
			display: grid;
			grid-template-columns: 140px 1fr;
			gap: 1rem;
			padding: .75rem 0;
			border-bottom: 1px solid rgba(255, 255, 255, .08);
		}

		body.light .detail-row {
			border-bottom-color: #e2e8f0;
		}

		.detail-label {
			font-weight: 600;
			color: #94a3b8;
		}

		.nav-tabs {
			display: flex;
			gap: 1rem;
			margin-bottom: 2rem;
			border-bottom: 2px solid rgba(255, 255, 255, .08);
		}

		body.light .nav-tabs {
			border-bottom-color: #e2e8f0;
		}

		.nav-tab {
			padding: 1rem 1.5rem;
			cursor: pointer;
			font-weight: 600;
			border-bottom: 3px solid transparent;
			margin-bottom: -2px;
			transition: all .2s;
		}

		.nav-tab.active {
			color: #6366f1;
			border-bottom-color: #6366f1;
		}

		.empty-state {
			text-align: center;
			padding: 4rem 2rem;
			color: #94a3b8;
		}
	</style>
</head>

<body class="ep-body">
	<div class="ep-layout">
	<div class="ep-main-wrap">
	<main class="ep-content">
	<div class="container">
	<div class="container">
		<div class="header">
			<div>
				<h1 style="margin:0; font-size:1.75rem" data-i18n="admin.pending.title">Admin Dashboard</h1>
				<p style="color:#94a3b8; margin:.5rem 0 0; font-size:.9rem" data-i18n="admin.pending.subtitle">จัดการคำขอสมัครใช้งาน</p>
			</div>
			<div style="display:flex; gap:1rem; align-items:center;">
				<!-- Theme Toggle Removed -->
				<a href="admin-dashboard.html" class="btn" style="background:#6366f1; color:#fff">
					<i class="fas fa-home"></i> <span data-i18n="admin.sidebar.dashboard">Dashboard</span>
				</a>
			</div>
		</div>

		<div class="stats">
			<div class="stat-card">
				<div class="stat-value" id="totalPending">0</div>
				<div class="stat-label" data-i18n="admin.pending.statPending">รอการอนุมัติ</div>
			</div>
			<div class="stat-card">
				<div class="stat-value" id="totalApproved">0</div>
				<div class="stat-label" data-i18n="admin.pending.statApproved">อนุมัติแล้ว</div>
			</div>
			<div class="stat-card">
				<div class="stat-value" id="totalRejected">0</div>
				<div class="stat-label" data-i18n="admin.pending.statRejected">ปฏิเสธ</div>
			</div>
			<div class="stat-card">
				<div class="stat-value" id="totalToday">0</div>
				<div class="stat-label" data-i18n="admin.pending.statToday">ยื่นคำขอวันนี้</div>
			</div>
		</div>

		<div class="nav-tabs">
			<div class="nav-tab active" onclick="switchTab('pending')">
				<i class="fas fa-clock"></i> <span data-i18n="admin.pending.tabPending">รออนุมัติ</span> <span id="pendingCount"
					style="background:rgba(251,191,36,.15); color:#fbbf24; padding:.25rem .5rem; border-radius:4px; margin-left:.5rem">0</span>
			</div>
			<div class="nav-tab" onclick="switchTab('approved')">
				<i class="fas fa-check-circle"></i> <span data-i18n="admin.pending.tabApproved">อนุมัติแล้ว</span> <span id="approvedCount"
					style="background:rgba(34,197,94,.15); color:#22c55e; padding:.25rem .5rem; border-radius:4px; margin-left:.5rem">0</span>
			</div>
			<div class="nav-tab" onclick="switchTab('rejected')">
				<i class="fas fa-times-circle"></i> <span data-i18n="admin.pending.tabRejected">ปฏิเสธ</span> <span id="rejectedCount"
					style="background:rgba(239,68,68,.15); color:#ef4444; padding:.25rem .5rem; border-radius:4px; margin-left:.5rem">0</span>
			</div>
		</div>

		<div class="card">
			<div class="card-header">
				<h2 style="margin:0; font-size:1.25rem" data-i18n="admin.pending.applications">คำขอสมัครใช้งาน</h2>
				<button class="btn" style="background:rgba(99,102,241,.15); color:#6366f1" onclick="loadApplications()">
					<i class="fas fa-sync"></i> <span data-i18n="admin.pending.refresh">รีเฟรช</span>
				</button>
			</div>
			<div style="overflow-x:auto;">
				<table id="applicationsTable">
					<thead>
						<tr>
							<th data-i18n="admin.pending.colDate">วันที่ยื่นเอกสาร</th>
							<th data-i18n="admin.pending.colName">ชื่อ-สกุล</th>
							<th data-i18n="admin.pending.colEmail">อีเมล</th>
							<th data-i18n="admin.pending.colCurrency">สกุลเงินหลัก</th>
							<th data-i18n="admin.pending.statusLabel">สถานะ</th>
							<th style="text-align:center" data-i18n="admin.pending.colManage">จัดการ</th>
						</tr>
					</thead>
					<tbody id="applicationsBody">
						<tr>
							<td colspan="6" class="empty-state">
								<i class="fas fa-inbox"
									style="font-size:3rem; opacity:.3; margin-bottom:1rem; display:block"></i>
								<span data-i18n="admin.pending.loading">กำลังโหลดข้อมูล...</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<!-- Modal for viewing details -->
	<div class="modal" id="detailModal">
		<div class="modal-content">
			<div class="modal-header">
				<h3 class="modal-title" data-i18n="admin.pending.detailTitle">รายละเอียดคำขอ</h3>
				<button class="close-btn" onclick="closeModal()">&times;</button>
			</div>
			<div id="modalBody"></div>
			<div style="display:flex; gap:1rem; margin-top:2rem; justify-content:flex-end;">
				<button class="btn btn-reject" onclick="updateStatus('rejected')">
					<i class="fas fa-times"></i> <span data-i18n="admin.pending.rejectBtn">ปฏิเสธ</span>
				</button>
				<button class="btn btn-approve" onclick="updateStatus('approved')">
					<i class="fas fa-check"></i> <span data-i18n="admin.pending.approveBtn">อนุมัติ</span>
				</button>
			</div>
		</div>
	</div>

	<script>
		let currentFilter = 'pending';
		let applications = [];
		let currentAppId = null;

		// Theme toggle
		const themeToggle = document.getElementById('themeToggle');
		themeToggle.addEventListener('click', () => {
			document.body.classList.toggle('light');
			const isLight = document.body.classList.contains('light');
			themeToggle.innerHTML = isLight ? '<i class="fas fa-moon"></i> โหมดมืด' : '<i class="fas fa-sun"></i> โหมดสว่าง';
			localStorage.setItem('elixopay-theme', isLight ? 'light' : 'dark');
		});
		if (localStorage.getItem('elixopay-theme') === 'light') {
			document.body.classList.add('light');
			themeToggle.innerHTML = '<i class="fas fa-moon"></i> โหมดมืด';
		}

		// Load applications from backend API
		async function loadApplications() {
			try {
				const token = localStorage.getItem('token');
				if (!token) return window.location.href = '/login.html';

				const response = await fetch(window.apiUrl('/api/v1/kyc/all')), {
					headers: { 'Authorization': `Bearer ${token}` }
				});

				const data = await response.json();
				if (data.success && data.data && data.data.users) {
					applications = data.data.users;
				} else {
					applications = [];
				}

				updateStats();
				renderTable();
			} catch (err) {
				console.error("Error loading applications:", err);
				document.getElementById('applicationsBody').innerHTML = `<tr><td colspan="6" class="empty-state text-red-500">Failed to load data</td></tr>`;
			}
		}

		function updateStats() {
			const pending = applications.filter(a => a.kycStatus === 'pending').length;
			const approved = applications.filter(a => a.kycStatus === 'verified').length;
			const rejected = applications.filter(a => a.kycStatus === 'rejected').length;
			const today = applications.filter(a => {
				if (!a.kycSubmittedAt) return false;
				const date = new Date(a.kycSubmittedAt);
				const now = new Date();
				return date.toDateString() === now.toDateString();
			}).length;

			document.getElementById('totalPending').textContent = pending;
			document.getElementById('totalApproved').textContent = approved;
			document.getElementById('totalRejected').textContent = rejected;
			document.getElementById('totalToday').textContent = today;
			document.getElementById('pendingCount').textContent = pending;
			document.getElementById('approvedCount').textContent = approved;
			document.getElementById('rejectedCount').textContent = rejected;
		}

		function switchTab(tab) {
			currentFilter = tab;
			document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
			event.target.closest('.nav-tab').classList.add('active');
			renderTable();
		}

		function renderTable() {
			// Backend uses "verified" instead of "approved"
			const filterStatus = currentFilter === 'approved' ? 'verified' : currentFilter;
			const filtered = applications.filter(a => a.kycStatus === filterStatus);
			const tbody = document.getElementById('applicationsBody');

			if (filtered.length === 0) {
				const noDataText = (window.t && window.t('admin.pending.noData')) || 'ไม่มีข้อมูลในหมวดนี้';
				tbody.innerHTML = `<tr><td colspan="6" class="empty-state">
					<i class="fas fa-inbox" style="font-size:3rem; opacity:.3; margin-bottom:1rem; display:block"></i>
					${noDataText}
				</td></tr>`;
				return;
			}

			tbody.innerHTML = filtered.map(app => {
				const submitDate = app.kycSubmittedAt ? new Date(app.kycSubmittedAt) : new Date(app.createdAt);
				const date = submitDate.toLocaleDateString('th-TH', {
					year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
				});
				const statusClass = app.kycStatus === 'pending' ? 'badge-pending' : app.kycStatus === 'verified' ? 'badge-approved' : 'badge-rejected';
				const statusText = app.kycStatus === 'pending' ? ((window.t && window.t('admin.pending.statusPending')) || 'รออนุมัติ') : app.kycStatus === 'verified' ? ((window.t && window.t('admin.pending.statusApproved')) || 'อนุมัติแล้ว') : ((window.t && window.t('admin.pending.statusRejected')) || 'ปฏิเสธ');
				const fullName = `${app.firstName || ''} ${app.lastName || ''}`.trim() || '—';
				const currency = app.wallet?.currency || 'THB';

				return `<tr>
					<td>${date}</td>
					<td><strong>${fullName}</strong></td>
					<td>${app.email}</td>
					<td>${currency}</td>
					<td><span class="badge ${statusClass}">${statusText}</span></td>
					<td style="text-align:center">
						<div class="actions">
							<button class="btn btn-view" onclick="viewDetails('${app.id}')">
								<i class="fas fa-eye"></i> ${(window.t && window.t('admin.pending.viewDetails')) || 'ดูรายละเอียด'}
							</button>
						</div>
					</td>
				</tr>`;
			}).join('');
		}

		function viewDetails(id) {
			const app = applications.find(a => String(a.id) === String(id));
			if (!app) return;
			currentAppId = app.id;

			const submitDate = app.kycSubmittedAt ? new Date(app.kycSubmittedAt) : new Date(app.createdAt);
			const date = submitDate.toLocaleDateString('th-TH', {
				year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
			});
			const verifiedDate = app.kycVerifiedAt ? new Date(app.kycVerifiedAt).toLocaleDateString('th-TH', {
				year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
			}) : '—';

			const statusClass = app.kycStatus === 'pending' ? 'badge-pending' : app.kycStatus === 'verified' ? 'badge-approved' : 'badge-rejected';
			const statusText = app.kycStatus === 'pending' ? ((window.t && window.t('admin.pending.statusPending')) || 'รออนุมัติ') : app.kycStatus === 'verified' ? ((window.t && window.t('admin.pending.statusApproved')) || 'อนุมัติแล้ว') : ((window.t && window.t('admin.pending.statusRejected')) || 'ปฏิเสธ');
			const fullName = `${app.firstName || ''} ${app.lastName || ''}`.trim() || '—';

			document.getElementById('modalBody').innerHTML = `
				<div class="detail-row">
					<div class="detail-label">${(window.t && window.t('admin.pending.userId')) || 'User ID'}</div>
					<div>${app.id}</div>
				</div>
				<div class="detail-row">
					<div class="detail-label">${(window.t && window.t('admin.pending.colDateSubmit')) || 'วันที่ยื่นเอกสาร'}</div>
					<div>${date}</div>
				</div>
				<div class="detail-row">
					<div class="detail-label">${(window.t && window.t('admin.pending.colNameLabel')) || 'ชื่อ-สกุล'}</div>
					<div><strong>${fullName}</strong></div>
				</div>
				<div class="detail-row">
					<div class="detail-label">${(window.t && window.t('admin.pending.colEmail')) || 'อีเมล'}</div>
					<div>${app.email}</div>
				</div>
				<div class="detail-row">
					<div class="detail-label">${(window.t && window.t('admin.pending.bankAccount')) || 'บัญชีธนาคาร'}</div>
					<div>
                        ${app.bankName ? `<strong>${app.bankName}</strong><br>` : ''}
                        ${app.bankAccountNumber ? `${app.bankAccountNumber}<br>` : ''}
                        ${app.bankAccountName ? `${app.bankAccountName}` : `<span style="color:var(--text-muted)">${(window.t && window.t('admin.pending.noInfo')) || 'ไม่มีข้อมูล'}</span>`}
                    </div>
				</div>
				<div class="detail-row" style="border-bottom: none">
					<div class="detail-label">${(window.t && window.t('admin.pending.documents')) || 'เอกสารการสมัคร'}</div>
					<div>
                        ${app.kycIdCardUrl ? `<div><a href="${app.kycIdCardUrl}" target="_blank" style="color:#6366f1; text-decoration:underline;">${(window.t && window.t('admin.pending.viewIdCard')) || 'ดูบัตรประชาชน/พาสปอร์ต'}</a></div>` : ''}
                        ${app.kycSelfieUrl ? `<div style="margin-top:0.5rem;"><a href="${app.kycSelfieUrl}" target="_blank" style="color:#6366f1; text-decoration:underline;">${(window.t && window.t('admin.pending.viewSelfie')) || 'ดูรูปถ่ายใบหน้าคู่บัตร'}</a></div>` : ''}
                        ${app.kycStatementUrl ? `<div style="margin-top:0.5rem;"><a href="${app.kycStatementUrl}" target="_blank" style="color:#6366f1; text-decoration:underline;">${(window.t && window.t('admin.pending.viewStatement')) || 'ดูรายการเดินบัญชี'}</a></div>` : ''}
                        ${!app.kycIdCardUrl && !app.kycSelfieUrl && !app.kycStatementUrl ? ((window.t && window.t('admin.pending.noDocs')) || 'ไม่มีเอกสารแนบ') : ''}
                    </div>
				</div>
                <hr style="border:0; border-top:1px solid rgba(255,255,255,0.08); margin: 1.5rem 0;">
                <div class="detail-row">
					<div class="detail-label">${(window.t && window.t('admin.pending.statusLabel')) || 'สถานะ'}</div>
					<div><span class="badge ${statusClass}">${statusText}</span></div>
				</div>
				<div class="detail-row">
					<div class="detail-label">${(window.t && window.t('admin.pending.verifiedDate')) || 'วันที่ตรวจสอบ'}</div>
					<div>${verifiedDate}</div>
				</div>
                ${app.kycStatus === 'rejected' && app.kycRejectionReason ? `
				<div class="detail-row">
					<div class="detail-label text-red-500">${(window.t && window.t('admin.pending.rejectReason')) || 'เหตุผลที่ปฏิเสธ'}</div>
					<div style="color: #ef4444">${app.kycRejectionReason}</div>
				</div>` : ''}
			`;

			document.getElementById('detailModal').classList.add('active');
		}

		function closeModal() {
			document.getElementById('detailModal').classList.remove('active');
			currentAppId = null;
		}

		async function updateStatus(newStatus) {
			if (!currentAppId) return;

			const app = applications.find(a => a.id === currentAppId);
			if (!app) return;

			// map UI param to backend API param ('approved' -> 'verified')
			const finalStatus = newStatus === 'approved' ? 'verified' : newStatus;

			let reason = null;
			if (finalStatus === 'rejected') {
				reason = prompt((window.t && window.t('admin.pending.rejectPrompt')) || "โปรดระบุเหตุผลที่ปฏิเสธ", "เอกสารไม่ชัดเจน/ไม่ครบถ้วน");
				if (!reason) return; // User cancelled prompt
			} else {
				if (!confirm((window.t && window.t('admin.pending.approveConfirm')) || "คุณรันการตรวจสอบแล้วยืนยันการอนุมัติใช่หรือไม่?")) return;
			}

			try {
				const token = localStorage.getItem('token');
				const response = await fetch(window.apiUrl(`/api/v1/kyc/verify/${currentAppId}`), {
					method: 'PUT',
					headers: {
						'Authorization': `Bearer ${token}`,
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({ status: finalStatus, reason })
				})

				const data = await response.json();

				if (data.success) {
					closeModal();
					loadApplications();

					// Show notification
					const msg = finalStatus === 'verified' ? ((window.t && window.t('admin.pending.approveSuccess')) || 'อนุมัติคำขอสำเร็จ') : ((window.t && window.t('admin.pending.rejectSuccess')) || 'ปฏิเสธคำขอแล้ว');
					alert(msg);
				} else {
					alert('Error: ' + data.message);
				}
			} catch (err) {
				console.error("Failed to verify KYC", err);
				alert((window.t && window.t('admin.pending.systemError')) || "ระบบขัดข้อง กรุณาลองใหม่อีกครั้ง");
			}
		}

		// Initialize
		document.addEventListener('DOMContentLoaded', () => {
			loadApplications();
		});
	</script>

	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script src="js/ui-enhancements.js?v=6"></script>

	</main>
	</div><!-- /ep-main-wrap -->
	</div><!-- /ep-layout -->
