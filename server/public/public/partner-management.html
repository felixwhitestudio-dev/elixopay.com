<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการทีม - Elixopay Partner</title>

    <!-- API Config -->
    <script src="/js/api-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .level-badge-partner {
            background: #4f46e5;
            color: white;
        }

        .level-badge-organizer {
            background: #8b5cf6;
            color: white;
        }

        .level-badge-agent {
            background: #ec4899;
            color: white;
        }

        .level-badge-merchant {
            background: #10b981;
            color: white;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900">

    <!-- Navigation (Simplified) -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-xl font-bold text-indigo-600">Elixopay Partner</span>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/dashboard.html"
                            class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">ภาพรวม</a>
                        <a href="#"
                            class="border-indigo-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">จัดการทีม</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <button onclick="logout()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">

        <!-- Header Actions -->
        <div class="md:flex md:items-center md:justify-between mb-6">
            <div class="flex-1 min-w-0">
                <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">โครงสร้างทีมของคุณ</h2>
                <p class="mt-1 text-sm text-gray-500">จัดการ Organizer, Agent และร้านค้าภายใต้สังกัด</p>
            </div>
            <div class="mt-4 flex md:mt-0 md:ml-4">
                <button onclick="openCreateModal()"
                    class="ml-3 inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none ring-2 ring-indigo-500">
                    <i class="fas fa-plus mr-2"></i> เพิ่มสมาชิกใหม่
                </button>
            </div>
        </div>

        <!-- Hierarchy Tree / Table -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <div class="px-4 py-5 sm:px-6 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                <h3 class="text-lg leading-6 font-medium text-gray-900">รายชื่อสมาชิก</h3>
                <div class="text-sm text-gray-500">
                    <span class="mr-3"><i class="fas fa-circle text-indigo-600"></i> Partner</span>
                    <span class="mr-3"><i class="fas fa-circle text-purple-500"></i> Organizer</span>
                    <span class="mr-3"><i class="fas fa-circle text-pink-500"></i> Agent</span>
                    <span><i class="fas fa-circle text-green-500"></i> Merchant</span>
                </div>
            </div>

            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Level
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            ชื่อบัญชี</th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">บทบาท
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">สถานะ
                        </th>
                        <th scope="col"
                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            ค่าธรรมเนียม %</th>
                        <th scope="col"
                            class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                            จัดการ</th>
                    </tr>
                </thead>
                <tbody id="hierarchyTableBody" class="bg-white divide-y divide-gray-200">
                    <!-- Loaded via JS -->
                    <tr>
                        <td colspan="6" class="px-6 py-4 text-center text-gray-500">กำลังโหลดข้อมูล...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="userModal" class="hidden fixed z-50 inset-0 overflow-y-auto" aria-labelledby="modal-title" role="dialog"
        aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"
                onclick="closeModal()"></div>

            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <div
                class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-medium text-gray-900" id="modalTitle">เพิ่มสมาชิกใหม่</h3>
                    <div class="mt-4 space-y-4">
                        <input type="hidden" id="editUserId">

                        <!-- Role Selection -->
                        <div id="roleSelectGroup">
                            <label class="block text-sm font-medium text-gray-700">บทบาท</label>
                            <select id="modalRole"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 py-2 border px-3">
                                <option value="organizer">Organizer (Level 2)</option>
                                <option value="agent">Agent (Level 3)</option>
                                <option value="merchant">Merchant (Level 4)</option>
                            </select>
                        </div>

                        <!-- Basic Info -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">ชื่อ</label>
                                <input type="text" id="modalFirstName"
                                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border px-3 py-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">นามสกุล</label>
                                <input type="text" id="modalLastName"
                                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border px-3 py-2">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">อีเมล</label>
                            <input type="email" id="modalEmail"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border px-3 py-2">
                        </div>

                        <div id="passwordGroup">
                            <label class="block text-sm font-medium text-gray-700">รหัสผ่าน</label>
                            <input type="password" id="modalPassword"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border px-3 py-2">
                        </div>

                        <!-- Fee Config -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700">
                                ค่าธรรมเนียมที่เรียกเก็บ (%)
                                <span class="text-xs text-gray-500">(ว่างไว้ = ใช้ค่าเริ่มต้นระบบ)</span>
                            </label>
                            <input type="number" step="0.0001" id="modalFee" placeholder="เช่น 0.005 สำหรับ 0.5%"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border px-3 py-2">
                        </div>

                        <!-- Status (Edit Only) -->
                        <div id="statusGroup" class="hidden">
                            <label class="block text-sm font-medium text-gray-700">สถานะบัญชี</label>
                            <select id="modalStatus"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border px-3 py-2">
                                <option value="active">ใช้งานปกติ (Active)</option>
                                <option value="disabled">ปิดการใช้งาน (Disabled)</option>
                            </select>
                        </div>

                        <div id="modalError" class="text-red-600 text-sm hidden"></div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="button" onclick="saveUser()"
                        class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">
                        บันทึก
                    </button>
                    <button type="button" onclick="closeModal()"
                        class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        ยกเลิก
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Logic Script -->
    <script src="/js/partner-management.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ui-enhancements.js"></script>
</body>

</html>
