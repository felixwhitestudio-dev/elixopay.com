<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน - Elixopay Checkout</title>
    <meta name="description" content="Secure payment checkout powered by Elixopay">
    <link rel="stylesheet" href="/css/utilities.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 50%, #f0fdfa 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }

        .checkout-card {
            width: 100%; max-width: 440px;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            box-shadow: 0 25px 60px -12px rgba(99,102,241,0.15), 0 0 0 1px rgba(226,232,240,0.8);
            overflow: hidden;
            animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes cardIn { from { transform: translateY(24px) scale(0.97); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        /* Header */
        .checkout-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            padding: 1.75rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .checkout-header::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.08) 0%, transparent 40%);
        }
        .checkout-header .merchant-label { color: rgba(255,255,255,0.7); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.25rem; }
        .checkout-header .merchant-name { color: #fff; font-size: 1.25rem; font-weight: 700; }
        .checkout-header .amount-display { color: #fff; font-size: 2.5rem; font-weight: 800; margin-top: 0.75rem; letter-spacing: -0.02em; }
        .checkout-header .amount-display .currency { font-size: 1.25rem; font-weight: 600; opacity: 0.8; vertical-align: super; margin-right: 0.25rem; }
        .checkout-header .description { color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-top: 0.5rem; }

        /* Tabs */
        .payment-tabs {
            display: flex; border-bottom: 1px solid #f1f5f9;
            background: #fafbfe;
        }
        .tab-btn {
            flex: 1; padding: 0.875rem; text-align: center;
            font-size: 0.8rem; font-weight: 600; color: #94a3b8;
            cursor: pointer; border: none; background: none;
            transition: all 0.2s; position: relative;
        }
        .tab-btn.active { color: #4f46e5; background: #fff; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
            height: 2px; background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 2px 2px 0 0;
        }
        .tab-btn i { margin-right: 0.4rem; }
        .tab-btn:hover:not(.active) { color: #64748b; background: rgba(99,102,241,0.04); }

        /* Body */
        .checkout-body { padding: 1.5rem; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeUp 0.3s ease-out; }
        @keyframes fadeUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Stripe Elements Styling */
        .form-label { font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 0.5rem; display: block; }
        .stripe-element-container {
            border: 1.5px solid #e2e8f0; border-radius: 0.75rem;
            padding: 0.875rem 1rem; background: #fff;
            transition: all 0.2s;
        }
        .stripe-element-container:focus-within, .stripe-element-container.StripeElement--focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .stripe-element-container.StripeElement--invalid { border-color: #f87171; }

        /* Pay Button */
        .pay-btn {
            width: 100%; padding: 1rem;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff; font-size: 1rem; font-weight: 700;
            border: none; border-radius: 0.75rem;
            cursor: pointer; transition: all 0.2s;
            margin-top: 1.5rem;
            box-shadow: 0 4px 14px -2px rgba(79,70,229,0.4);
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .pay-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px -2px rgba(79,70,229,0.5); }
        .pay-btn:active:not(:disabled) { transform: translateY(0); }
        .pay-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .pay-btn .btn-spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }

        /* Error Message */
        .error-banner {
            background: #fef2f2; border: 1px solid #fecaca; border-radius: 0.625rem;
            padding: 0.75rem 1rem; margin-top: 1rem;
            font-size: 0.8rem; color: #dc2626;
            display: none; align-items: center; gap: 0.5rem;
        }
        .error-banner.visible { display: flex; }
        .error-banner i { flex-shrink: 0; }

        /* QR Code Section */
        .qr-section { text-align: center; padding: 0.5rem 0; }
        .qr-frame {
            display: inline-block; position: relative;
            background: #fff; padding: 1rem; border-radius: 1rem;
            box-shadow: 0 8px 30px -8px rgba(0,0,0,0.08);
            border: 1px solid #f1f5f9;
        }
        .qr-frame img { width: 200px; height: 200px; border-radius: 0.5rem; }
        .qr-frame .corner { position: absolute; width: 14px; height: 14px; border-color: #6366f1; }
        .qr-frame .corner.tl { top: 8px; left: 8px; border-top: 2.5px solid; border-left: 2.5px solid; border-radius: 4px 0 0 0; }
        .qr-frame .corner.tr { top: 8px; right: 8px; border-top: 2.5px solid; border-right: 2.5px solid; border-radius: 0 4px 0 0; }
        .qr-frame .corner.bl { bottom: 8px; left: 8px; border-bottom: 2.5px solid; border-left: 2.5px solid; border-radius: 0 0 0 4px; }
        .qr-frame .corner.br { bottom: 8px; right: 8px; border-bottom: 2.5px solid; border-right: 2.5px solid; border-radius: 0 0 4px 0; }
        .qr-hint { margin-top: 1rem; font-size: 0.8rem; color: #64748b; font-weight: 500; }
        .qr-hint i { color: #6366f1; margin-right: 0.25rem; }
        .qr-polling { margin-top: 1rem; font-size: 0.75rem; color: #94a3b8; }
        .qr-polling .pulse-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #6366f1; animation: pulse 1.5s ease-in-out infinite; margin-right: 0.4rem; vertical-align: middle; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

        /* Success State */
        .success-state { text-align: center; padding: 2rem 1rem; animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1); }
        .success-icon { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #22c55e, #16a34a); display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 2rem; box-shadow: 0 10px 30px -5px rgba(34,197,94,0.4); margin-bottom: 1.25rem; }
        .success-state h2 { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin: 0 0 0.5rem; }
        .success-state p { font-size: 0.9rem; color: #64748b; margin: 0 0 1.5rem; }
        .success-state .return-btn { display: inline-block; padding: 0.875rem 2rem; background: #0f172a; color: #fff; border-radius: 0.75rem; font-weight: 600; text-decoration: none; transition: all 0.2s; border: none; cursor: pointer; font-size: 0.9rem; }
        .success-state .return-btn:hover { background: #1e293b; transform: translateY(-1px); }

        /* Loading / Error full state */
        .full-state { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 50%, #f0fdfa 100%); z-index: 100; }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(99,102,241,0.15); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .checkout-footer { background: #fafbfe; border-top: 1px solid #f1f5f9; padding: 0.875rem; text-align: center; font-size: 0.7rem; color: #94a3b8; font-weight: 500; }
        .checkout-footer i { font-size: 0.6rem; margin-right: 0.25rem; opacity: 0.6; }

        /* Cards row */
        .accepted-cards { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 0.75rem; }
        .accepted-cards .card-icon { width: 36px; height: 24px; border-radius: 4px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 700; color: #475569; border: 1px solid #e2e8f0; }
    </style>
</head>

<body>
    <!-- Loading State -->
    <div id="loadingState" class="full-state">
        <div class="spinner"></div>
        <p style="color: #64748b; font-weight: 500;">กำลังโหลดรายการชำระเงิน...</p>
    </div>

    <!-- Error State -->
    <div id="errorState" class="full-state" style="display:none;">
        <div style="width:64px;height:64px;border-radius:50%;background:#fef2f2;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#ef4444;margin-bottom:1rem;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 style="font-size:1.25rem;font-weight:700;color:#0f172a;margin:0 0 0.5rem;">ไม่พบรายการชำระเงิน</h2>
        <p id="errorMessage" style="font-size:0.85rem;color:#64748b;margin:0;">ลิงก์ชำระเงินนี้อาจหมดอายุแล้วหรือไม่ถูกต้อง</p>
    </div>

    <!-- Main Checkout Card -->
    <div id="checkoutCard" class="checkout-card" style="display:none;">
        <!-- Header with Amount -->
        <div class="checkout-header">
            <div class="merchant-label">ชำระเงินให้</div>
            <div class="merchant-name" id="merchantName">...</div>
            <div class="amount-display">
                <span class="currency" id="currencyDisplay">฿</span><span id="amountDisplay">0.00</span>
            </div>
            <div class="description" id="orderDescription"></div>
        </div>

        <!-- Payment Pending Body -->
        <div id="pendingBody">
            <!-- Tabs -->
            <div class="payment-tabs" id="paymentTabs">
                <button class="tab-btn active" data-tab="card" id="tabCard">
                    <i class="far fa-credit-card"></i> บัตรเครดิต/เดบิต
                </button>
                <button class="tab-btn" data-tab="qr" id="tabQR">
                    <i class="fas fa-qrcode"></i> PromptPay QR
                </button>
            </div>

            <div class="checkout-body">
                <!-- Card Payment Tab -->
                <div class="tab-content active" id="tabContentCard">
                    <label class="form-label">ข้อมูลบัตร</label>
                    <div class="stripe-element-container" id="card-element-container">
                        <div id="card-element"></div>
                    </div>

                    <div class="accepted-cards">
                        <div class="card-icon"><i class="fab fa-cc-visa" style="font-size:1.1rem;color:#1a1f71;"></i></div>
                        <div class="card-icon"><i class="fab fa-cc-mastercard" style="font-size:1.1rem;color:#eb001b;"></i></div>
                        <div class="card-icon"><i class="fab fa-cc-amex" style="font-size:1.1rem;color:#006fcf;"></i></div>
                        <div class="card-icon"><i class="fab fa-cc-jcb" style="font-size:1.1rem;color:#0e4c96;"></i></div>
                    </div>

                    <div class="error-banner" id="cardError">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="cardErrorText"></span>
                    </div>

                    <button class="pay-btn" id="payBtn" type="button">
                        <i class="fas fa-lock" style="font-size:0.8rem;"></i>
                        <span id="payBtnText">ชำระเงิน</span>
                    </button>
                </div>

                <!-- QR Payment Tab -->
                <div class="tab-content" id="tabContentQR">
                    <div class="qr-section">
                        <div class="qr-frame" id="qrFrame">
                            <div class="corner tl"></div>
                            <div class="corner tr"></div>
                            <div class="corner bl"></div>
                            <div class="corner br"></div>
                            <img id="qrImage" src="" alt="PromptPay QR Code">
                        </div>
                        <div class="qr-hint">
                            <i class="fas fa-camera"></i> สแกนด้วยแอปธนาคารใดก็ได้
                        </div>
                        <div class="qr-polling">
                            <span class="pulse-dot"></span> รอการชำระเงิน...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Success Body -->
        <div id="successBody" class="success-state" style="display:none;">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2>ชำระเงินสำเร็จ!</h2>
            <p>ยอดเงิน <strong>฿<span id="successAmt">0.00</span></strong> ได้ถูกส่งเรียบร้อยแล้ว</p>
            <button class="return-btn" id="returnBtn">กลับไปยังร้านค้า</button>
        </div>

        <!-- Footer -->
        <div class="checkout-footer">
            <i class="fas fa-lock"></i> Secured by Elixopay · SSL Encrypted
        </div>
    </div>

    <script>
        // --- Configuration ---
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5001' : '';

        let stripe = null;
        let cardElement = null;
        let paymentToken = null;
        let paymentData = null;
        let pollInterval = null;

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            paymentToken = urlParams.get('token') || urlParams.get('ref') || urlParams.get('id');

            if (!paymentToken) {
                showError('ไม่พบรหัสอ้างอิงการชำระเงินในลิงก์');
                return;
            }

            fetchPaymentDetails();
        });

        // --- Fetch Payment Details ---
        async function fetchPaymentDetails() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/checkout/${paymentToken}`);
                const json = await res.json();

                if (!res.ok || !json.success) {
                    throw new Error(json.error?.message || json.message || 'ไม่สามารถโหลดข้อมูลการชำระเงินได้');
                }

                paymentData = json.data;

                if (paymentData.status === 'COMPLETED') {
                    showSuccess(paymentData.amount);
                    return;
                }

                if (paymentData.status !== 'PENDING') {
                    showError('สถานะการชำระเงิน: ' + paymentData.status);
                    return;
                }

                renderCheckout();
            } catch (error) {
                showError(error.message);
            }
        }

        // --- Render Checkout ---
        function renderCheckout() {
            // Hide loading, show card
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('checkoutCard').style.display = '';

            // Populate data
            document.getElementById('merchantName').textContent = paymentData.merchantName || 'Merchant';
            document.getElementById('amountDisplay').textContent = Number(paymentData.amount).toLocaleString('en-US', { minimumFractionDigits: 2 });
            document.getElementById('orderDescription').textContent = paymentData.description || '';

            const isStripe = paymentData.paymentMethodType === 'stripe' || !paymentData.paymentMethodType;
            const hasQR = paymentData.paymentMethodType === 'kbank_qr' || paymentData.qrCodeBase64;

            // Setup tabs visibility
            if (paymentData.method === 'qr') {
                // Strictly QR transaction
                document.getElementById('tabCard').style.display = 'none';
                document.getElementById('paymentTabs').style.display = 'none';
                switchTab('qr');
            } else {
                if (!hasQR) {
                    document.getElementById('tabQR').style.display = 'none';
                }
                if (!isStripe) {
                    document.getElementById('tabCard').style.display = 'none';
                    // If only QR, activate QR tab
                    if (hasQR) {
                        switchTab('qr');
                    }
                }
            }

            // Init Stripe Elements if card payment
            if (isStripe && paymentData.stripePublicKey && paymentData.clientSecret) {
                initStripeElements();
            }

            // Load QR if available
            if (hasQR && paymentData.qrCodeBase64) {
                const img = document.getElementById('qrImage');
                img.src = paymentData.qrCodeBase64;
                startPolling();
            } else if (!hasQR) {
                // Hide QR tab entirely
                document.getElementById('paymentTabs').style.display = isStripe ? 'none' : '';
                // If only stripe, just show card form without tabs
                if (isStripe && !hasQR) {
                    document.getElementById('paymentTabs').style.display = 'none';
                }
            }

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            // Pay button
            document.getElementById('payBtn').addEventListener('click', handleCardPayment);

            // Return button
            document.getElementById('returnBtn').addEventListener('click', () => {
                window.location.href = paymentData.returnUrl || '/';
            });
        }

        // --- Tab Switching ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.toggle('active', tc.id === `tabContent${tabId === 'card' ? 'Card' : 'QR'}`));
        }

        // --- Init Stripe Elements ---
        function initStripeElements() {
            stripe = Stripe(paymentData.stripePublicKey);
            const elements = stripe.elements({
                clientSecret: paymentData.clientSecret,
                appearance: {
                    theme: 'stripe',
                    variables: {
                        colorPrimary: '#6366f1',
                        colorBackground: '#ffffff',
                        colorText: '#0f172a',
                        colorDanger: '#ef4444',
                        fontFamily: 'Inter, system-ui, sans-serif',
                        borderRadius: '8px',
                        spacingUnit: '4px',
                    },
                    rules: {
                        '.Input': {
                            border: 'none',
                            boxShadow: 'none',
                            fontSize: '15px',
                        },
                        '.Input:focus': {
                            boxShadow: 'none',
                        }
                    }
                }
            });

            cardElement = elements.create('payment', {
                layout: {
                    type: 'tabs',
                    defaultCollapsed: false,
                }
            });
            cardElement.mount('#card-element');

            cardElement.on('change', (event) => {
                const errorEl = document.getElementById('cardError');
                if (event.error) {
                    document.getElementById('cardErrorText').textContent = event.error.message;
                    errorEl.classList.add('visible');
                } else {
                    errorEl.classList.remove('visible');
                }
            });
        }

        // --- Handle Card Payment ---
        async function handleCardPayment() {
            if (!stripe || !cardElement) {
                showCardError('Stripe ยังไม่พร้อมใช้งาน กรุณารอสักครู่');
                return;
            }

            const payBtn = document.getElementById('payBtn');
            const payBtnText = document.getElementById('payBtnText');
            const originalText = payBtnText.innerHTML;

            // Disable button and show spinner
            payBtn.disabled = true;
            payBtnText.innerHTML = '<div class="btn-spinner"></div> กำลังดำเนินการ...';

            try {
                const { error, paymentIntent } = await stripe.confirmPayment({
                    elements: cardElement._parent, // Pass the elements instance
                    confirmParams: {
                        return_url: paymentData.returnUrl 
                            ? paymentData.returnUrl + (paymentData.returnUrl.includes('?') ? '&' : '?') + 'status=success'
                            : window.location.origin + '/checkout.html?token=' + paymentToken + '&status=success',
                    },
                    redirect: 'if_required',
                });

                if (error) {
                    showCardError(error.message);
                    payBtn.disabled = false;
                    payBtnText.innerHTML = originalText;
                } else if (paymentIntent && paymentIntent.status === 'succeeded') {
                    showSuccess(paymentData.amount);
                } else if (paymentIntent && paymentIntent.status === 'requires_action') {
                    // 3D Secure or other action — Stripe handles this automatically
                    // The page will redirect if needed
                } else {
                    // Payment may still be processing
                    startPolling();
                    payBtnText.innerHTML = '<div class="btn-spinner"></div> รอยืนยัน...';
                }
            } catch (err) {
                showCardError(err.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
                payBtn.disabled = false;
                payBtnText.innerHTML = originalText;
            }
        }

        // --- Show Card Error ---
        function showCardError(message) {
            const errorEl = document.getElementById('cardError');
            document.getElementById('cardErrorText').textContent = message;
            errorEl.classList.add('visible');
            setTimeout(() => errorEl.classList.remove('visible'), 6000);
        }

        // --- Polling for QR/async payment ---
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/v1/checkout/${paymentToken}`);
                    const json = await res.json();
                    if (json.success && json.data && json.data.status === 'COMPLETED') {
                        clearInterval(pollInterval);
                        showSuccess(json.data.amount || paymentData.amount);
                    }
                } catch (e) {
                    console.warn('Polling error:', e);
                }
            }, 3000);
        }

        // --- Success ---
        function showSuccess(amount) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('checkoutCard').style.display = '';
            document.getElementById('pendingBody').style.display = 'none';
            document.getElementById('successBody').style.display = '';
            document.getElementById('successAmt').textContent = Number(amount).toLocaleString('en-US', { minimumFractionDigits: 2 });
            if (pollInterval) clearInterval(pollInterval);
        }

        // --- Error ---
        function showError(msg) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('checkoutCard').style.display = 'none';
            document.getElementById('errorState').style.display = 'flex';
            document.getElementById('errorMessage').textContent = msg;
        }
    </script>
</body>

</html>
