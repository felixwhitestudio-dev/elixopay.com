<!DOCTYPE html>
<html lang="th" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน - Elixopay Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
        }

        .success-animation {
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* QR Container styling */
        .qr-container {
            position: relative;
            background: white;
            padding: 1rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
        }

        /* Spinner */
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #4f46e5;
            width: 32px;
            height: 32px;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 selection:bg-indigo-100">

    <!-- Loading State -->
    <div id="loadingState" class="flex flex-col items-center justify-center absolute inset-0 z-50 bg-slate-50">
        <div class="spinner mb-4"></div>
        <p class="text-slate-500 font-medium">กำลังโหลดการชำระเงิน...</p>
    </div>

    <!-- Error State -->
    <div id="errorState" class="hidden w-full max-w-md text-center">
        <div
            class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-sm">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">ไม่พบรายการชำระเงิน</h2>
        <p id="errorMessage" class="text-slate-500 mb-6">ลิงก์ชำระเงินนี้อาจหมดอายุแล้วหรือไม่ถูกต้อง</p>
    </div>

    <!-- Main Checkout Container -->
    <main id="checkoutContainer" class="hidden w-full max-w-[420px] relative">

        <!-- Dev Tools (Simulate Payment) -->
        <div class="absolute -top-12 right-0 left-0 flex justify-center">
            <button id="simulateBtn" onclick="simulatePayment()"
                class="bg-indigo-100 text-indigo-700 text-xs font-bold px-4 py-1.5 rounded-full hover:bg-indigo-200 transition-colors flex items-center shadow-sm opacity-50 hover:opacity-100 cursor-help"
                title="โหมดนักพัฒนา: จำลองการจ่ายเงินสำเร็จ">
                <i class="fas fa-magic mr-1.5"></i> Simulate Payment (DevMode)
            </button>
        </div>

        <div
            class="glass-panel rounded-[2rem] shadow-2xl shadow-indigo-500/10 border border-slate-100 overflow-hidden relative">

            <!-- Header -->
            <header class="p-6 text-center border-b border-slate-100 bg-white relative">
                <div
                    class="absolute top-6 left-6 w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center transform rotate-6 shadow-sm">
                    <span class="text-white font-bold text-lg" style="transform: rotate(-6deg);">e</span>
                </div>
                <p class="text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">จ่ายให้ร้านค้า</p>
                <h1 id="merchantName" class="text-xl font-bold text-slate-900 truncate px-10">...</h1>
            </header>

            <!-- Pending Body -->
            <div id="pendingBody" class="p-6 md:p-8 flex flex-col items-center">
                <p class="text-sm text-slate-500 mb-2 text-center" id="orderDescription">...</p>

                <div class="flex items-baseline mb-6">
                    <span class="text-2xl font-semibold text-slate-800 mr-1">฿</span>
                    <span id="amountDisplay"
                        class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight">0.00</span>
                </div>

                <!-- QR Wrap -->
                <div class="qr-container mb-6 group relative">
                    <img id="qrImage" src="" alt="PromptPay QR Code"
                        class="w-full h-auto aspect-square object-contain max-w-[240px] mx-auto rounded-xl">

                    <!-- Scan overlays -->
                    <div class="absolute top-4 left-4 w-4 h-4 border-t-2 border-l-2 border-indigo-500 rounded-tl-lg">
                    </div>
                    <div class="absolute top-4 right-4 w-4 h-4 border-t-2 border-r-2 border-indigo-500 rounded-tr-lg">
                    </div>
                    <div class="absolute bottom-4 left-4 w-4 h-4 border-b-2 border-l-2 border-indigo-500 rounded-bl-lg">
                    </div>
                    <div
                        class="absolute bottom-4 right-4 w-4 h-4 border-b-2 border-r-2 border-indigo-500 rounded-br-lg">
                    </div>
                </div>

                <div
                    class="flex items-center text-sm font-medium text-slate-500 bg-slate-50 px-4 py-2 rounded-full border border-slate-100">
                    <i class="fas fa-camera text-indigo-500 mr-2"></i> สแกนด้วยแอปธนาคารใดก็ได้
                </div>

                <p class="mt-6 text-xs text-slate-400 font-medium">รอการชำระเงิน... (Ref: <span
                        id="refIdDisplay"></span>)</p>
            </div>

            <!-- Success Body -->
            <div id="successBody"
                class="hidden p-8 flex flex-col items-center text-center success-animation relative overflow-hidden">
                <div class="absolute inset-0 bg-green-500/5 pointer-events-none"></div>
                <div
                    class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center text-white text-4xl mb-6 shadow-xl shadow-green-500/30 transform scale-110">
                    <i class="fas fa-check"></i>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-900 mb-2">ชำระเงินสำเร็จแล้ว!</h2>
                <p class="text-slate-500 mb-8" id="successDesc">ยอดเงิน ฿<span id="successAmt"></span>
                    ได้ถูกส่งไปยังร้านค้าเรียบร้อยแล้ว</p>

                <button onclick="goBackToMerchant()"
                    class="w-full bg-slate-900 text-white font-semibold py-3.5 rounded-xl hover:bg-slate-800 transition-colors shadow-lg shadow-slate-900/20">
                    กลับไปยังร้านค้า
                </button>
            </div>

            <!-- Footer -->
            <footer
                class="bg-slate-50/80 p-4 border-t border-slate-100 flex items-center justify-center text-xs text-slate-400 font-medium space-x-2">
                <i class="fas fa-lock text-[10px] text-slate-300"></i>
                <span>Secured by Elixopay</span>
            </footer>
        </div>
    </main>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000' : '';

        let paymentId = null;
        let pollInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            paymentId = urlParams.get('ref') || urlParams.get('id');

            if (!paymentId) {
                showError("ไม่พบรหัสอ้างอิงการชำระเงินในลิงก์");
                return;
            }

            fetchDetails();
        });

        async function fetchDetails() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/checkout/${paymentId}`);
                const data = await res.json();

                if (!res.ok) throw new Error(data.message || 'ไม่สามารถโหลดข้อมูลได้');

                renderCheckout(data.data);

                // If pending, start polling
                if (data.data.status === 'PENDING') {
                    startPolling();
                } else if (data.data.status === 'COMPLETED') {
                    showSuccess(data.data.amount);
                } else {
                    showError("สถานะการชำระเงิน: " + data.data.status);
                }

            } catch (error) {
                showError(error.message);
            }
        }

        function renderCheckout(info) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('checkoutContainer').classList.remove('hidden');

            document.getElementById('merchantName').textContent = info.merchantName || 'Merchant';
            document.getElementById('orderDescription').textContent = info.description || 'Payment';
            document.getElementById('amountDisplay').textContent = Number(info.amount).toLocaleString('en-US', { minimumFractionDigits: 2 });
            document.getElementById('refIdDisplay').textContent = info.id;

            if (info.qrCodeBase64) {
                document.getElementById('qrImage').src = info.qrCodeBase64;
            }
        }

        function startPolling() {
            // Poll every 3 seconds to check if status changed to COMPLETED
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/v1/checkout/${paymentId}`);
                    const data = await res.json();
                    if (res.ok && data.data && data.data.status === 'COMPLETED') {
                        clearInterval(pollInterval);
                        showSuccess(data.data.amount);
                    }
                } catch (e) {
                    console.warn("Polling error", e);
                }
            }, 3000);
        }

        function showSuccess(amount) {
            document.getElementById('pendingBody').classList.add('hidden');
            document.getElementById('successBody').classList.remove('hidden');
            document.getElementById('successAmt').textContent = Number(amount).toLocaleString('en-US', { minimumFractionDigits: 2 });
            document.getElementById('simulateBtn').classList.add('hidden');
        }

        function showError(msg) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('checkoutContainer').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = msg;
        }

        // Developer Tool: Simulate Payment
        async function simulatePayment() {
            const btn = document.getElementById('simulateBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1.5"></i> Processing';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/v1/checkout/${paymentId}/mock-pay`, { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);

                // Polling will naturally pick up the COMPLETED status, but let's force a fetch to be instant
                clearInterval(pollInterval);
                await fetchDetails();
            } catch (err) {
                alert("Mock Pay Error: " + err.message);
                btn.innerHTML = '<i class="fas fa-magic mr-1.5"></i> Simulate Payment (DevMode)';
                btn.disabled = false;
            }
        }

        function goBackToMerchant() {
            // If there's a return_url in real life, redirect. Else go to homepage.
            window.location.href = '/';
        }
    </script>
</body>

</html>
