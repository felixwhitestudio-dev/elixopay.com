# ─────────────────────────────────────────────
# Elixopay — Nginx Reverse Proxy Configuration
# ─────────────────────────────────────────────
# Place in: /etc/nginx/sites-available/elixopay
# Enable:  ln -s /etc/nginx/sites-available/elixopay /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.elixopay.com app.elixopay.com;

    # Let's Encrypt ACME challenge (required for cert issuance/renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (SSL) — Main Application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.elixopay.com app.elixopay.com;

    # ─── SSL Certificate Paths ───
    # These are generated by Let's Encrypt (Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.elixopay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.elixopay.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.elixopay.com/chain.pem;

    # ─── SSL Security Settings ───
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Security Headers ───
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Logging ───
    access_log /var/log/nginx/elixopay.access.log;
    error_log  /var/log/nginx/elixopay.error.log;

    # ─── Request Limits ───
    client_max_body_size 10M;

    # ─── Reverse Proxy → TypeScript Server (port 3000) ───
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ─── Reverse Proxy → JavaScript App Server (port 8080) ───
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Static Files (KYC uploads, etc.) ───
    location /uploads/ {
        alias /home/ubuntu/elixopay/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
