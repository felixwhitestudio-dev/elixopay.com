<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Drop Shadow -->
    <filter id="shadow">
        <feDropShadow dx="2" dy="4" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    
    <!-- Shield Shape -->
    <path d="M50 90C50 90 85 75 85 30V15H15V30C15 75 50 90 50 90Z" fill="url(#shieldGradient)" stroke="#4c1d95" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Inner Highlight -->
    <path d="M50 82C50 82 78 68 78 32V20H22V32C22 68 50 82 50 82Z" fill="url(#innerGradient)" opacity="0.6"/>
    
    <!-- Lock Icon inside -->
    <rect x="35" y="42" width="30" height="24" rx="4" fill="#fff" stroke="#4c1d95" stroke-width="2"/>
    <path d="M50 34C46.686 34 44 36.686 44 40V42H56V40C56 36.686 53.314 34 50 34Z" stroke="#4c1d95" stroke-width="2" fill="none"/>
    <circle cx="50" cy="54" r="3" fill="#4c1d95"/>
    <rect x="49" y="54" width="2" height="6" fill="#4c1d95"/>
    
    <defs>
        <linearGradient id="shieldGradient" x1="15" y1="15" x2="85" y2="90" gradientUnits="userSpaceOnUse">
            <stop stop-color="#C4B5FD"/>
            <stop offset="1" stop-color="#A78BFA"/>
        </linearGradient>
        <linearGradient id="innerGradient" x1="22" y1="20" x2="78" y2="82" gradientUnits="userSpaceOnUse">
            <stop stop-color="#E9D5FF"/>
            <stop offset="1" stop-color="#C4B5FD" stop-opacity="0"/>
        </linearGradient>
    </defs>
</svg>
