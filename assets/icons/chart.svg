<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <filter id="shadow">
        <feDropShadow dx="2" dy="4" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    
    <!-- Tablet Frame -->
    <rect x="10" y="10" width="80" height="80" rx="10" fill="url(#tabletGradient)" stroke="#0e7490" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Screen -->
    <rect x="18" y="18" width="64" height="64" rx="6" fill="#ecfeff"/>
    
    <!-- Bar Chart -->
    <rect x="24" y="50" width="10" height="26" fill="#22d3ee" stroke="#0e7490" stroke-width="1.5"/>
    <rect x="38" y="40" width="10" height="36" fill="#22d3ee" stroke="#0e7490" stroke-width="1.5"/>
    <rect x="52" y="30" width="10" height="46" fill="#22d3ee" stroke="#0e7490" stroke-width="1.5"/>
    <rect x="66" y="20" width="10" height="56" fill="#4ade80" stroke="#15803d" stroke-width="1.5"/> <!-- Growth highlight -->
    
    <!-- Trend Line -->
    <path d="M24 45L38 35L52 25L66 15" stroke="#15803d" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 2"/>
    
    <defs>
        <linearGradient id="tabletGradient" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
            <stop stop-color="#CFFAFE"/>
            <stop offset="1" stop-color="#A5F3FC"/>
        </linearGradient>
    </defs>
</svg>
